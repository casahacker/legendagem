server {
    server_name legendagem.example.org;

    # display.html standalone — Web Speech API roda 100% no browser.
    root /path/to/legendagem/web;
    index display.html;

    # Permite getUserMedia (mic). Sem isso, alguns browsers bloqueiam.
    add_header Permissions-Policy "microphone=(self)";

    location / {
        try_files $uri $uri/ /display.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/legendagem.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/legendagem.example.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = legendagem.example.org) {
        return 301 https://$host$request_uri;
    }
    server_name legendagem.example.org;
    listen 80;
    return 404;
}
