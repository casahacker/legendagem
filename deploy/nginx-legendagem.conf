server {
    server_name legendagem.example.org;

    # display.html servido como raiz
    root /path/to/legendagem/web;
    index display.html;

    # cabeçalhos de microfone (Permissions-Policy) — necessário para getUserMedia
    add_header Permissions-Policy "microphone=(self)";

    # WebSocket do WhisperLiveKit
    location /asr {
        proxy_pass         http://127.0.0.1:18092/asr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # streams longos
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
        proxy_buffering off;
    }

    # static files
    location / {
        try_files $uri $uri/ /display.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/legendagem.example.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/legendagem.example.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = legendagem.example.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name legendagem.example.org;

    listen 80;
    return 404; # managed by Certbot


}